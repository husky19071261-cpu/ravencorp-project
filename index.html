<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RavenCorp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    .container {
      margin-top: 120px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 30px;
      font-size: 1.1rem;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      color: white;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>RavenCorp</h1>
    <p>Your futuristic project hub</p>
    <button onclick="startApp()">Get Started</button>
  </div>

  <script>
    function startApp() {
      alert("Welcome to RavenCorp 🚀");
    }
  </script>
</body>
</html>
