<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RavenCorp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.hidden { display: none; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

#dropZone {
  border: 2px dashed #3b82f6;
  padding: 20px;
  margin: 10px auto;
  width: 350px;
}
</style>
</head>

<body>

<h1>RavenCorp</h1>

<button onclick="showVideos()">🎬 Videos</button>
<button onclick="showIdeas()">🧠 Ideas</button>

<!-- VIDEOS -->
<div id="videosPage" class="hidden">

<h2>Video Cloud</h2>

<div id="dropZone">📁 Drag Videos Here</div>

<input id="search" placeholder="Search..." oninput="loadVideos()">

<div id="videoList" class="grid"></div>

</div>

<!-- IDEAS -->
<div id="ideasPage" class="hidden">
<h2>Ideas</h2>

<input id="ideaInput">
<button onclick="addIdea()">Add</button>

<div id="ideasList"></div>

</div>

<script>

/* 🔥 SESSION FILE STORAGE (FIXES PLAYBACK) */
let sessionFiles = {};

/* NAV */
function showVideos() {
  document.getElementById("videosPage").classList.remove("hidden");
  document.getElementById("ideasPage").classList.add("hidden");
  loadVideos();
}

function showIdeas() {
  document.getElementById("ideasPage").classList.remove("hidden");
  document.getElementById("videosPage").classList.add("hidden");
  loadIdeas();
}

/* DRAG & DROP */
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => {
  e.preventDefault();
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  let videos = JSON.parse(localStorage.getItem("videos")) || [];

  for (let file of files) {
    if (!file.type.startsWith("video")) continue;

    const id = Date.now() + Math.random();

    sessionFiles[id] = file;

    videos.push({
      id: id,
      title: file.name
    });
  }

  localStorage.setItem("videos", JSON.stringify(videos));
  loadVideos();
}

/* LOAD VIDEOS */
function loadVideos() {
  const list = document.getElementById("videoList");
  list.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  let videos = JSON.parse(localStorage.getItem("videos")) || [];

  videos
    .filter(v => v.title.toLowerCase().includes(search))
    .forEach(v => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        ${v.title}<br>
        <button onclick="playVideo(${v.id})">▶ Play</button>
      `;

      list.appendChild(div);
    });
}

/* PLAY VIDEO */
function playVideo(id) {
  const file = sessionFiles[id];

  if (!file) {
    alert("Re-drag the video to play it.");
    return;
  }

  const url = URL.createObjectURL(file);

  const player = document.createElement("div");
  player.className = "card";

  player.innerHTML = `
    <video controls autoplay width="100%">
      <source src="${url}">
    </video>
    <button onclick="this.parentElement.remove()">Close</button>
  `;

  document.getElementById("videoList").prepend(player);
}

/* IDEAS */
function addIdea() {
  const input = document.getElementById("ideaInput");

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
  ideas.push(input.value);

  localStorage.setItem("ideas", JSON.stringify(ideas));
  input.value = "";

  loadIdeas();
}

function loadIdeas() {
  const list = document.getElementById("ideasList");
  list.innerHTML = "";

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

  ideas.forEach(i => {
    const div = document.createElement("div");
    div.className = "card";
    div.textContent = i;
    list.appendChild(div);
  });
}

</script>

</body>
</html>
