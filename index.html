<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RavenCorp - Local Cloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.hidden { display: none; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

#dropZone {
  border: 2px dashed #3b82f6;
  padding: 20px;
  margin: 10px auto;
  width: 350px;
}
</style>
</head>

<body>

<h1>RavenCorp</h1>

<button onclick="showVideos()">🎬 Videos</button>
<button onclick="showIdeas()">🧠 Ideas</button>

<div id="videosPage" class="hidden">
<h2>Video Cloud</h2>

<div id="dropZone">📁 Drag Videos Here</div>

<input id="search" placeholder="Search..." oninput="loadVideos()">

<div id="videoList" class="grid"></div>
</div>

<div id="ideasPage" class="hidden">
<h2>Ideas</h2>

<input id="ideaInput">
<button onclick="addIdea()">Add</button>

<div id="ideasList"></div>
</div>

<script>

/* ---------- DATABASE ---------- */
let db;

const request = indexedDB.open("RavenCorpDB", 1);

request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("videos", { keyPath: "id" });
};

request.onsuccess = e => {
  db = e.target.result;
  loadVideos();
};

/* ---------- NAV ---------- */
function showVideos() {
  document.getElementById("videosPage").classList.remove("hidden");
  document.getElementById("ideasPage").classList.add("hidden");
  loadVideos();
}

function showIdeas() {
  document.getElementById("ideasPage").classList.remove("hidden");
  document.getElementById("videosPage").classList.add("hidden");
  loadIdeas();
}

/* ---------- DRAG DROP ---------- */
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => e.preventDefault());

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  for (let file of files) {
    if (!file.type.startsWith("video")) continue;

    let tx = db.transaction("videos", "readwrite");
    let store = tx.objectStore("videos");

    store.add({
      id: Date.now() + Math.random(),
      title: file.name,
      fileData: file
    });
  }

  setTimeout(loadVideos, 200);
}

/* ---------- LOAD VIDEOS ---------- */
function loadVideos() {
  const list = document.getElementById("videoList");
  list.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  let tx = db.transaction("videos", "readonly");
  let store = tx.objectStore("videos");

  store.openCursor().onsuccess = e => {
    let cursor = e.target.result;
    if (!cursor) return;

    let video = cursor.value;

    if (video.title.toLowerCase().includes(search)) {
      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        ${video.title}<br>
        <button onclick="playVideo(${video.id})">▶ Play</button>
        <button onclick="deleteVideo(${video.id})">Delete</button>
      `;

      list.appendChild(div);
    }

    cursor.continue();
  };
}

/* ---------- PLAY ---------- */
function playVideo(id) {
  let tx = db.transaction("videos", "readonly");
  let store = tx.objectStore("videos");

  let request = store.get(id);

  request.onsuccess = () => {
    let file = request.result.fileData;
    let url = URL.createObjectURL(file);

    let player = document.createElement("div");
    player.className = "card";

    player.innerHTML = `
      <video controls autoplay width="100%">
        <source src="${url}">
      </video>
      <button onclick="this.parentElement.remove()">Close</button>
    `;

    document.body.appendChild(player);
  };
}

/* ---------- DELETE ---------- */
function deleteVideo(id) {
  let tx = db.transaction("videos", "readwrite");
  let store = tx.objectStore("videos");
  store.delete(id);

  setTimeout(loadVideos, 200);
}

/* ---------- IDEAS ---------- */
function addIdea() {
  let input = document.getElementById("ideaInput");

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
  ideas.push(input.value);

  localStorage.setItem("ideas", JSON.stringify(ideas));
  input.value = "";

  loadIdeas();
}

function loadIdeas() {
  let list = document.getElementById("ideasList");
  list.innerHTML = "";

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

  ideas.forEach(i => {
    let div = document.createElement("div");
    div.className = "card";
    div.textContent = i;
    list.appendChild(div);
  });
}

</script>

</body>
</html>
