<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RavenCorp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      margin: 0;
    }

    .container {
      margin-top: 60px;
      padding: 20px;
    }

    .hidden {
      display: none;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin: 5px;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 8px 16px;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      margin: 5px;
    }

    .card {
      background: #1e293b;
      margin: 10px auto;
      padding: 15px;
      border-radius: 12px;
      width: 320px;
      text-align: left;
    }

    .status {
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- HOME -->
  <div class="container" id="home">
    <h1>RavenCorp</h1>
    <p>Your video command center</p>
    <button onclick="openDashboard()">Get Started</button>
  </div>

  <!-- DASHBOARD -->
  <div class="container hidden" id="dashboard">
    <h1>Dashboard</h1>
    <button onclick="openIdeas()">Ideas</button>
    <button onclick="openVideos()">Videos</button>
    <button onclick="goHome()">Back</button>
  </div>

  <!-- IDEAS -->
  <div class="container hidden" id="ideasPage">
    <h1>🧠 Ideas</h1>

    <input id="ideaInput" placeholder="Enter idea...">
    <button onclick="addIdea()">Add</button>

    <div id="ideasList"></div>

    <button onclick="goDashboard()">Back</button>
  </div>

  <!-- VIDEOS -->
  <div class="container hidden" id="videosPage">
    <h1>🎬 Videos</h1>

    <input id="titleInput" placeholder="Video title">
    <input id="linkInput" placeholder="Link or file name">

    <select id="statusInput">
      <option value="Idea">Idea</option>
      <option value="Editing">Editing</option>
      <option value="Posted">Posted</option>
    </select>

    <br>
    <button onclick="addVideo()">Add Video</button>

    <div id="videoList"></div>

    <button onclick="goDashboard()">Back</button>
  </div>

  <script>
    function hideAll() {
      document.getElementById("home").classList.add("hidden");
      document.getElementById("dashboard").classList.add("hidden");
      document.getElementById("ideasPage").classList.add("hidden");
      document.getElementById("videosPage").classList.add("hidden");
    }

    function openDashboard() {
      hideAll();
      document.getElementById("dashboard").classList.remove("hidden");
    }

    function openIdeas() {
      hideAll();
      document.getElementById("ideasPage").classList.remove("hidden");
      loadIdeas();
    }

    function openVideos() {
      hideAll();
      document.getElementById("videosPage").classList.remove("hidden");
      loadVideos();
    }

    function goHome() {
      hideAll();
      document.getElementById("home").classList.remove("hidden");
    }

    function goDashboard() {
      hideAll();
      document.getElementById("dashboard").classList.remove("hidden");
    }

    // IDEAS
    function addIdea() {
      const input = document.getElementById("ideaInput");
      const text = input.value.trim();
      if (!text) return;

      let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
      ideas.push(text);
      localStorage.setItem("ideas", JSON.stringify(ideas));

      input.value = "";
      loadIdeas();
    }

    function loadIdeas() {
      const list = document.getElementById("ideasList");
      list.innerHTML = "";

      let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

      ideas.forEach((idea, index) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          ${idea}<br>
          <button onclick="moveToVideos('${idea.replace(/'/g, "\\'")}')">Make Video</button>
          <button onclick="deleteIdea(${index})">Delete</button>
        `;

        list.appendChild(div);
      });
    }

    function deleteIdea(index) {
      let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
      ideas.splice(index, 1);
      localStorage.setItem("ideas", JSON.stringify(ideas));
      loadIdeas();
    }

    function moveToVideos(ideaText) {
      let videos = JSON.parse(localStorage.getItem("videos")) || [];
      videos.push({ title: ideaText, link: "", status: "Idea" });
      localStorage.setItem("videos", JSON.stringify(videos));
      openVideos();
    }

    // VIDEOS
    function addVideo() {
      const title = document.getElementById("titleInput").value.trim();
      const link = document.getElementById("linkInput").value.trim();
      const status = document.getElementById("statusInput").value;

      if (!title) return;

      let videos = JSON.parse(localStorage.getItem("videos")) || [];
      videos.push({ title, link, status });
      localStorage.setItem("videos", JSON.stringify(videos));

      document.getElementById("titleInput").value = "";
      document.getElementById("linkInput").value = "";

      loadVideos();
    }

    function loadVideos() {
      const list = document.getElementById("videoList");
      list.innerHTML = "";

      let videos = JSON.parse(localStorage.getItem("videos")) || [];

      videos.forEach((video, index) => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <strong>${video.title}</strong><br>
          <span>${video.link || ""}</span><br>
          <span class="status">Status: ${video.status}</span><br>
          <button onclick="deleteVideo(${index})">Delete</button>
        `;

        list.appendChild(div);
      });
    }

    function deleteVideo(index) {
      let videos = JSON.parse(localStorage.getItem("videos")) || [];
      videos.splice(index, 1);
      localStorage.setItem("videos", JSON.stringify(videos));
      loadVideos();
    }
  </script>

</body>
</html>
