<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RavenCorp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: #020617;
}

.page {
  padding: 20px;
}

.hidden { display: none; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: #1e293b;
  border-radius: 12px;
  overflow: hidden;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.thumbnail {
  height: 160px;
  background: #020617;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
}

.card-content {
  padding: 10px;
}

button {
  background: #3b82f6;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

#dropZone {
  border: 2px dashed #3b82f6;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <h2>RavenCorp</h2>
  <div>
    <button onclick="showVideos()">🎬 Videos</button>
    <button onclick="showIdeas()">🧠 Ideas</button>
  </div>
</div>

<!-- VIDEOS -->
<div id="videosPage" class="page">

<div id="dropZone">📁 Drag Videos Here</div>

<input id="search" placeholder="Search..." oninput="loadVideos()">

<br><br>

<div id="videoList" class="grid"></div>
</div>

<!-- IDEAS -->
<div id="ideasPage" class="page hidden">

<input id="ideaInput" placeholder="New idea...">
<button onclick="addIdea()">Add</button>

<div id="ideasList"></div>

</div>

<script>

/* ---------- DB ---------- */
let db;

const req = indexedDB.open("RavenCorpDB", 1);

req.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore("videos", { keyPath: "id" });
};

req.onsuccess = e => {
  db = e.target.result;
  loadVideos();
};

/* ---------- NAV ---------- */
function showVideos() {
  document.getElementById("videosPage").classList.remove("hidden");
  document.getElementById("ideasPage").classList.add("hidden");
  loadVideos();
}

function showIdeas() {
  document.getElementById("ideasPage").classList.remove("hidden");
  document.getElementById("videosPage").classList.add("hidden");
  loadIdeas();
}

/* ---------- DRAG DROP ---------- */
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => e.preventDefault());

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  for (let file of files) {
    if (!file.type.startsWith("video")) continue;

    let tx = db.transaction("videos", "readwrite");
    let store = tx.objectStore("videos");

    store.add({
      id: Date.now() + Math.random(),
      title: file.name,
      fileData: file
    });
  }

  setTimeout(loadVideos, 200);
}

/* ---------- LOAD VIDEOS ---------- */
function loadVideos() {
  const list = document.getElementById("videoList");
  list.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();

  let tx = db.transaction("videos", "readonly");
  let store = tx.objectStore("videos");

  store.openCursor().onsuccess = e => {
    let cursor = e.target.result;
    if (!cursor) return;

    let video = cursor.value;

    if (video.title.toLowerCase().includes(search)) {

      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="thumbnail">🎬</div>
        <div class="card-content">
          <strong>${video.title}</strong><br><br>
          <button onclick="playVideo(${video.id})">▶ Play</button>
          <button onclick="deleteVideo(${video.id})">Delete</button>
        </div>
      `;

      list.appendChild(div);
    }

    cursor.continue();
  };
}

/* ---------- PLAY INLINE ---------- */
function playVideo(id) {
  let tx = db.transaction("videos", "readonly");
  let store = tx.objectStore("videos");

  let request = store.get(id);

  request.onsuccess = () => {
    let file = request.result.fileData;
    let url = URL.createObjectURL(file);

    let player = document.createElement("div");
    player.className = "card";

    player.innerHTML = `
      <video controls autoplay width="100%">
        <source src="${url}">
      </video>
      <button onclick="this.parentElement.remove()">Close</button>
    `;

    document.body.appendChild(player);
  };
}

/* ---------- DELETE ---------- */
function deleteVideo(id) {
  let tx = db.transaction("videos", "readwrite");
  let store = tx.objectStore("videos");
  store.delete(id);

  setTimeout(loadVideos, 200);
}

/* ---------- IDEAS ---------- */
function addIdea() {
  let input = document.getElementById("ideaInput");

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
  ideas.push(input.value);

  localStorage.setItem("ideas", JSON.stringify(ideas));
  input.value = "";

  loadIdeas();
}

function loadIdeas() {
  let list = document.getElementById("ideasList");
  list.innerHTML = "";

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

  ideas.forEach(i => {
    let div = document.createElement("div");
    div.className = "card";
    div.textContent = i;
    list.appendChild(div);
  });
}

</script>

</body>
</html>
