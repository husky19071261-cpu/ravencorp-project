<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RavenCorp - Local Cloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

/* NAV */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #020617;
}

/* PAGE */
.page { padding: 20px; }
.hidden { display: none; }

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

/* DROP ZONE */
#dropZone {
  border: 2px dashed #3b82f6;
  padding: 20px;
  margin-bottom: 15px;
}

/* BUTTON */
button {
  background: #3b82f6;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>RavenCorp</h2>
  <div>
    <button onclick="showVideos()">🎬 Videos</button>
    <button onclick="showIdeas()">🧠 Ideas</button>
  </div>
</div>

<!-- VIDEOS -->
<div id="videosPage" class="page">

<button onclick="loadFolder()">📂 Load Video Folder</button>

<div id="dropZone">📁 Drag Videos Here (optional)</div>

<input id="searchInput" placeholder="Search..." oninput="renderVideos()">

<br><br>

<div id="videoList" class="grid"></div>

</div>

<!-- IDEAS -->
<div id="ideasPage" class="page hidden">
<input id="ideaInput" placeholder="New idea...">
<button onclick="addIdea()">Add</button>

<div id="ideasList"></div>
</div>

<script>

/* ---------- STORAGE ---------- */
let folderFiles = [];
let draggedFiles = [];

/* ---------- NAV ---------- */
function showVideos() {
  document.getElementById("videosPage").classList.remove("hidden");
  document.getElementById("ideasPage").classList.add("hidden");
  renderVideos();
}

function showIdeas() {
  document.getElementById("ideasPage").classList.remove("hidden");
  document.getElementById("videosPage").classList.add("hidden");
  loadIdeas();
}

/* ---------- FOLDER LOAD (REAL STORAGE) ---------- */
async function loadFolder() {
  const dir = await window.showDirectoryPicker();

  folderFiles = [];

  for await (const entry of dir.values()) {
    if (entry.kind === "file") {
      const file = await entry.getFile();
      if (file.type.startsWith("video")) {
        folderFiles.push(file);
      }
    }
  }

  renderVideos();
}

/* ---------- DRAG DROP (OPTIONAL) ---------- */
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e => e.preventDefault());

dropZone.addEventListener("drop", e => {
  e.preventDefault();

  for (let file of e.dataTransfer.files) {
    if (file.type.startsWith("video")) {
      draggedFiles.push(file);
    }
  }

  renderVideos();
});

/* ---------- RENDER VIDEOS ---------- */
function renderVideos() {
  const list = document.getElementById("videoList");
  list.innerHTML = "";

  const search = document.getElementById("searchInput").value.toLowerCase();

  const allVideos = [...folderFiles, ...draggedFiles];

  allVideos
    .filter(v => v.name.toLowerCase().includes(search))
    .forEach((file, index) => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <strong>🎬 ${file.name}</strong><br><br>
        <button onclick="playVideo(${index})">▶ Play</button>
      `;

      list.appendChild(div);
    });
}

/* ---------- PLAY ---------- */
function playVideo(index) {
  const allVideos = [...folderFiles, ...draggedFiles];
  const file = allVideos[index];

  const url = URL.createObjectURL(file);

  const player = document.createElement("div");
  player.className = "card";

  player.innerHTML = `
    <video controls autoplay width="100%">
      <source src="${url}">
    </video>
    <button onclick="this.parentElement.remove()">Close</button>
  `;

  document.body.appendChild(player);
}

/* ---------- IDEAS ---------- */
function addIdea() {
  let input = document.getElementById("ideaInput");

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];
  ideas.push(input.value);

  localStorage.setItem("ideas", JSON.stringify(ideas));
  input.value = "";

  loadIdeas();
}

function loadIdeas() {
  let list = document.getElementById("ideasList");
  list.innerHTML = "";

  let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

  ideas.forEach(i => {
    let div = document.createElement("div");
    div.className = "card";
    div.textContent = i;
    list.appendChild(div);
  });
}

</script>

</body>
</html>
